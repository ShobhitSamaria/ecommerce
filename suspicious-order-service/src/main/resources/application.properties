spring.application.name=suspicious-order-service
server.port=8086

# HikariCP Connection Pooling (faster DB connections)
spring.datasource.url=jdbc:postgresql://localhost:5432/db_suspicious_order_service
spring.datasource.username=shobhitsamaria
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
