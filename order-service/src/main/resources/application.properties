# Service Name
spring.application.name=order-service

# Port (Distinct from Order and Product services)
server.port=8085

# Database for Order Service
spring.datasource.url=jdbc:postgresql://localhost:5432/db_order_service
spring.datasource.username=shobhitsamaria
spring.datasource.password=

# HikariCP Connection Pooling (faster DB connections)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA / Hibernate settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka Client (To register with the Service Registry)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/